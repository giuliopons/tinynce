<!DOCTYPE html>
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
	<meta name="robots" content="noindex">

	##JQUERYINCLUDE##
	<script src="##root##src/template/comode.js?v=##VER##"></script>

	<title>##TITLE##</title>
</head>
<body>
	<div class="panel2">
		<div class="titlecontainer">
			<a href="##gestore##" class="annulla" title="{Cancel}"></a> <h1 class='title'>##TITLE##</h1> <a href="javascript:checkConStato()" class="salva"> {Save}</a>
		</div>
	</div>
	<div class="corpo">
		##STARTFORM##
		##id##
		##op##
		<fieldset class='mainfieldset'>
			<legend>{Cost details}</legend>
			<div id='Datiprincipali'>
				<table>
					<tr>
						<td valign='top' width='150'>{Job}</td>
						<td>##cd_job##</td>
					</tr>
					<tr>
						<td valign='top'>{Supplier}</td>
						<td>##cd_fornitore##</td>
					</tr>
					<tr>
						<td valign='top'>{Amount}</td>
						<td>##nu_importo## ##MONEY##</td>
					</tr>
					<tr>
						<td valign='top'>{Payment date}</td>
						<td>##dt_payment##</td>
					</tr>
					<tr>
						<td valign='top'>{Status}</td>
						<td>##en_status##</td>
					</tr>
				</table>
			</div>
		</fieldset>
		##ENDFORM##
	</div>
</body>
</html>
